<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Match Found Preview</title>
<style>
  /* Match the app's color tokens (gold + black + crimson). */
  :root {
    --bg:           #000000;
    --card:         #0e0e10;
    --gold:         #d4a93f;
    --red:          #b03434;
    --text:         #e8e6dc;
    --text-muted:   #9a978a;
    --border:       #2a241a;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    background: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text);
  }

  /* iPhone-shaped frame so the proportions look right */
  .phone {
    width: 390px;
    height: 760px;
    margin: 30px auto;
    background: var(--bg);
    border-radius: 32px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 60px rgba(212, 175, 55, 0.3);
  }
  /* Faux scoring screen behind the overlay so you can see what's underneath */
  .background-mock {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #1a3320 0%, #0d2010 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 1.5px;
  }

  /* Backdrop overlay */
  .backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.92);
    opacity: 0;
    z-index: 10;
    animation: fadeIn 0.25s ease-out forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  /* Two-side row */
  .row {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 12px;
  }

  .side {
    flex: 1;
    background: var(--card);
    border-radius: 12px;
    border: 2px solid;
    padding: 14px;
    text-align: center;
    opacity: 0;
  }
  .side-me       { border-color: var(--gold); }
  .side-opponent { border-color: var(--red); }
  .side-1 {
    transform: translateX(-300px);
    animation: slideInLeft 0.5s cubic-bezier(.215,.61,.355,1) 0.05s forwards;
  }
  .side-2 {
    transform: translateX(300px);
    animation: slideInRight 0.5s cubic-bezier(.215,.61,.355,1) 0.05s forwards;
  }
  @keyframes slideInLeft  { to { transform: translateX(0); opacity: 1; } }
  @keyframes slideInRight { to { transform: translateX(0); opacity: 1; } }

  .side-tag {
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 1.4px;
    margin-bottom: 8px;
  }
  .clan-avatar {
    width: 72px;
    height: 72px;
    border-radius: 8px;
    margin: 0 auto 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(212, 175, 55, 0.15);
    border: 2px solid var(--gold);
    color: var(--gold);
    font-family: Georgia, serif;
    font-size: 32px;
    font-weight: 900;
  }
  .side-opponent .clan-avatar { border-color: var(--red); color: var(--red); background: rgba(176, 52, 52, 0.15); }
  .clan-name { font-family: Georgia, serif; font-weight: 900; font-size: 16px; }
  .clan-elo  { color: var(--gold); font-weight: 900; font-size: 12px; margin-top: 2px; }
  .side-opponent .clan-elo { color: var(--red); }

  .members {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .member {
    display: flex;
    align-items: center;
    gap: 8px;
    text-align: left;
  }
  .member-avatar {
    width: 26px;
    height: 26px;
    border-radius: 13px;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-weight: 900;
    font-size: 11px;
    flex-shrink: 0;
  }
  .member-name { font-size: 12px; font-weight: 700; }
  .member-elo  { font-size: 10px; color: var(--text-muted); }

  .theme-pill {
    margin-top: 10px;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--gold);
    background: rgba(212, 175, 55, 0.06);
    display: inline-block;
  }
  .theme-pill-label {
    color: var(--gold); font-size: 8px; font-weight: 900; letter-spacing: 1px;
  }
  .theme-pill-title {
    color: var(--text); font-size: 10px; font-weight: 700; margin-top: 2px;
  }

  /* VS badge — spring scale */
  .vs {
    width: 56px;
    height: 56px;
    border-radius: 28px;
    background: var(--gold);
    color: var(--bg);
    font-family: Georgia, serif;
    font-size: 22px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transform: scale(0);
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
    animation: vsSpring 0.6s cubic-bezier(.34,1.56,.64,1) 0.45s forwards;
  }
  @keyframes vsSpring {
    0%   { transform: scale(0); }
    70%  { transform: scale(1.25); }
    100% { transform: scale(1); }
  }

  .dismiss {
    position: absolute;
    bottom: 60px;
    left: 0;
    right: 0;
    text-align: center;
  }
  .dismiss-btn {
    display: inline-block;
    padding: 12px 28px;
    border: 1px solid var(--gold);
    border-radius: 6px;
    color: var(--gold);
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 1.5px;
    cursor: pointer;
    user-select: none;
    opacity: 0;
    animation: fadeIn 0.4s ease-out 1.0s forwards;
  }
  .dismiss-btn:hover { background: rgba(212, 175, 55, 0.1); }

  .controls {
    text-align: center;
    margin-bottom: 20px;
    color: #aaa;
    font-size: 13px;
  }
  .controls button {
    background: var(--gold);
    color: black;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    font-weight: 900;
    cursor: pointer;
    margin: 0 4px;
  }
  .controls button:hover { background: #f0c95a; }
</style>
</head>
<body>
  <div class="controls">
    <button onclick="replay()">▶ Replay Animation</button>
    <span style="margin-left: 16px;">(opponent's theme song would play in the real app)</span>
  </div>

  <div class="phone" id="phone">
    <div class="background-mock">SCORING SCREEN · HOLE 12</div>

    <div class="overlay">
      <div class="backdrop"></div>

      <div class="row" style="z-index: 11;">
        <!-- YOUR SIDE -->
        <div class="side side-me side-1">
          <div class="side-tag">YOU</div>
          <div class="clan-avatar">S</div>
          <div class="clan-name">Sacari Knights</div>
          <div class="clan-elo">1485 ELO</div>
          <div class="members">
            <div class="member">
              <div class="member-avatar">R</div>
              <div>
                <div class="member-name">richard</div>
                <div class="member-elo">1492 ELO</div>
              </div>
            </div>
            <div class="member">
              <div class="member-avatar">J</div>
              <div>
                <div class="member-name">jamie</div>
                <div class="member-elo">1478 ELO</div>
              </div>
            </div>
          </div>
        </div>

        <!-- VS BADGE -->
        <div class="vs">VS</div>

        <!-- OPPONENT SIDE -->
        <div class="side side-opponent side-2">
          <div class="side-tag">OPPONENT</div>
          <div class="clan-avatar">F</div>
          <div class="clan-name">Fairway Bandits</div>
          <div class="clan-elo">1502 ELO</div>
          <div class="members">
            <div class="member">
              <div class="member-avatar">M</div>
              <div>
                <div class="member-name">mike_g</div>
                <div class="member-elo">1510 ELO</div>
              </div>
            </div>
            <div class="member">
              <div class="member-avatar">T</div>
              <div>
                <div class="member-name">tina_p</div>
                <div class="member-elo">1494 ELO</div>
              </div>
            </div>
          </div>
          <div class="theme-pill">
            <div class="theme-pill-label">♫ ANTHEM</div>
            <div class="theme-pill-title">Eye of the Tiger</div>
          </div>
        </div>
      </div>

      <div class="dismiss">
        <div class="dismiss-btn">TAP TO START</div>
      </div>
    </div>
  </div>

  <script>
    function replay() {
      const phone = document.getElementById('phone');
      const overlay = phone.querySelector('.overlay');
      const html = overlay.outerHTML;
      overlay.remove();
      phone.insertAdjacentHTML('beforeend', html);
    }
  </script>
</body>
</html>
